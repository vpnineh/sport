name: zBET90 Value Betting Scanner

on:
  schedule:
    # Every 2 hours
    #- cron: '0 */2 * * *'
  workflow_dispatch:  # Manual trigger

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🚀 Run zBET90 Scanner
        env:
          # Required API Keys
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          
          # Optional Configuration
          SCAN_WINDOW_HOURS: ${{ vars.SCAN_WINDOW_HOURS || '3' }}
          MIN_EV_PERCENTAGE: ${{ vars.MIN_EV_PERCENTAGE || '3.0' }}
          MAX_BOOKMAKER_MARGIN: ${{ vars.MAX_BOOKMAKER_MARGIN || '8.0' }}
          KELLY_FRACTION: ${{ vars.KELLY_FRACTION || '0.25' }}
          
          # AI Settings
          GROQ_MODEL: ${{ vars.GROQ_MODEL || 'llama-3.3-70b-versatile' }}
          GROQ_TEMPERATURE: ${{ vars.GROQ_TEMPERATURE || '0.1' }}
          
          # Telegram
          TELEGRAM_ID: ${{ vars.TELEGRAM_ID || '@zBET90' }}
          
        run: python main.py
      
      - name: 📊 Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: zbet90-logs
          path: zbet90.log
          retention-days: 7
