name: ZBET90 Enterprise v3.0

on:
  #schedule:
    #- cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      force_bootstrap:
        description: 'Force re-download datasets'
        required: false
        default: 'false'

jobs:
  run-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Restore Cache
        uses: actions/cache@v4
        with:
          path: api_cache
          key: zbet90-v3-${{ github.run_number }}
          restore-keys: |
            zbet90-v3-

      - name: Run ZBET90 Engine
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          FORCE_BOOTSTRAP: ${{ github.event.inputs.force_bootstrap || 'false' }}
        run: python main2.py

      - name: Commit Cache Files
        run: |
          git config --local user.email "zbet90-bot@github.com"
          git config --local user.name "ZBET90 Bot"
          git add api_cache/ || true
          git diff --staged --quiet || git commit -m "bot: update cache [skip ci]"
          git push || true

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zbet90-logs-${{ github.run_number }}
          path: api_cache/execution_logs.log
          retention-days: 7
